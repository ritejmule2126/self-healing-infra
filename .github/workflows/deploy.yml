name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install flask psutil gunicorn pytest

    - name: Run basic tests
      run: |
        cd app/api
        python -c "from app import app; print('App imports OK')"

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./app/api
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/self-healing-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Configure kubectl
      run: |
        aws eks update-kubeconfig --region ap-south-1 --name self-healing-cluster

    - name: Deploy to EKS
      run: |
        kubectl set image deployment/self-healing-api \
          api=${{ secrets.DOCKER_USERNAME }}/self-healing-api:latest \
          -n self-healing
        kubectl rollout status deployment/self-healing-api -n self-healing

    - name: Verify deployment
      run: |
        kubectl get pods -n self-healing
        echo "Deployment successful"
