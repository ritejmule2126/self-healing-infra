apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-predictor
  namespace: self-healing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-predictor
  template:
    metadata:
      labels:
        app: ai-predictor
    spec:
      containers:
      - name: ai-predictor
        image: ritejmule2610/self-healing-ai:v1
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-predictor-svc
  namespace: self-healing
spec:
  selector:
    app: ai-predictor
  ports:
  - port: 8000
    targetPort: 8000
