apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: self-healing-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: self-healing
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total{namespace="self-healing"}[5m]) > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"

    - alert: HighCPUUsage
      expr: >
        sum(rate(container_cpu_usage_seconds_total{namespace="self-healing"}[2m]))
        by (pod) > 0.8
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "High CPU on pod {{ $labels.pod }}"

    - alert: PodNotReady
      expr: kube_pod_status_ready{namespace="self-healing",condition="true"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} is not ready"
